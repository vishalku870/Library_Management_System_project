<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo / Heading -->
        <div class="login-logo">
            <div class="book-icon">📚</div>
            <h1>LibraryMS</h1>
            <p>Library Management System</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" name="phone" placeholder="Enter your phone number"
                   form="login-form" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password"
                   form="login-form" required>
        </div>

        <form id="login-form" method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="phone" id="phone-hidden">
            <input type="hidden" name="password" id="pass-hidden">
        </form>

        <div class="form-submit">
            <button class="btn btn-primary" style="width:100%;"
                onclick="
                    document.getElementById('phone-hidden').value = document.getElementById('phone').value;
                    document.getElementById('pass-hidden').value = document.getElementById('password').value;
                    document.getElementById('login-form').submit();
                ">
                Login →
            </button>
        </div>

        <p style="text-align:center; margin-top:20px; color: var(--text-muted); font-size:0.85rem;">
            Admin: <strong>9999999999</strong> / <strong>admin123</strong>
        </p>

    </div>
</div>
</body>
</html>
