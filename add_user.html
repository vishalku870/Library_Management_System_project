{% extends "base.html" %}
{% block title %}Add User — LibraryMS{% endblock %}

{% block content %}
<h2 class="page-title">👤 Create New User</h2>

<div class="form-card">
    <!-- enctype needed for file (photo) upload -->
    <form method="POST" action="{{ url_for('add_user') }}" enctype="multipart/form-data">

        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" name="name" placeholder="e.g. Rahul Sharma"
                   required autofocus>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number * (used as Login ID)</label>
            <input type="tel" id="phone" name="phone" placeholder="e.g. 9876543210"
                   required maxlength="10">
        </div>

        <div class="form-group">
            <label for="password">Password *</label>
            <input type="text" id="password" name="password" placeholder="Set a password"
                   required>
        </div>

        <div class="form-group">
            <label for="photo">Profile Photo (optional)</label>
            <input type="file" id="photo" name="photo" accept="image/*">
            <small style="color:var(--text-muted); font-size:0.82rem;">
                JPG / PNG / GIF — Max 5MB
            </small>
        </div>

        <div class="form-submit">
            <button type="submit" class="btn btn-primary">Create User</button>
            <a href="{{ url_for('admin_users') }}" class="btn btn-accent">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
